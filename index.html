<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<style>
body {

  background:#f7f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card {
  width:92%;
  max-width:450px;
  background:white;
  padding:20px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

button {

  cursor:pointer;
}

.typeBtn {

}

}

#box {
  background:#f2f2f2;

.gen { background:#ff6aa2; color:white; }

</style>
</head>

<body>

<div class="card">

<h3>JY Salon ж–ҮжЎҲз”ҹжҲҗеҷЁ</h3>

<div>
<button class="typeBtn active" onclick="setType('nail', this)">зҫҺз”І</button>
<button class="typeBtn" onclick="setType('hair', this)">зҫҺеҸ‘</button>
<button class="typeBtn" onclick="setType('both', this)">зҫҺз”І+зҫҺеҸ‘</button>
</div>

<div id="box">иҜ·йҖүжӢ©жңҚеҠЎ</div>

<button class="gen" onclick="generate()">з”ҹжҲҗж–ҮжЎҲ</button>
<button class="copy" onclick="copy()">еӨҚеҲ¶</button>
<button class="wa" onclick="wa()">WhatsAppйў„зәҰ</button>

</div>

<script>
let type = "nail";
let textNow = "";

const base =
`рҹ“ҚJY Hair Design Nail Salon (Bukit Indah, Johor Bahru)

#bukitindahзҫҺеҸ‘зҫҺз”Іеә— #jbsalon #ж–°еұұзҫҺз”І #ж–°еұұеүӘеҸ‘ #jyhairdesignnailsalon`;

const data = {
nail:[
"д»ҠеӨ©еҒҡзҫҺз”ІпјҢж•ҙдҪ“еҫҲиҲ’жңҚрҹӨҚ",
"зҫҺз”ІеёҲеҫҲз»Ҷеҝғрҹ’…",
"жҲҗе“ҒеҫҲзІҫиҮҙвңЁ",
"з®ҖеҚ•ж¬ҫд№ҹеҫҲеҘҪзңӢрҹҢҝ"
],
hair:[
"д»ҠеӨ©еүӘеӨҙеҸ‘еҫҲж»Ўж„Ҹрҹ’ҮвҖҚвҷҖпёҸ",
"и®ҫи®ЎеёҲеҫҲдё“дёҡвңЁ",
"еүӘе®ҢеҫҲиҮӘз„¶рҹ‘Қ",
"ж•ҙдҪ“дҪ“йӘҢеҫҲеҘҪрҹӨҚ"
],
both:[
"д»ҠеӨ©еӨҙеҸ‘+зҫҺз”ІдёҖиө·еҒҡрҹӨҚ",
"ж•ҙдҪ“еҸҳеҫ—еҫҲзІҫиҮҙвңЁ",
"дёҖж¬Ўжҗһе®ҡеҫҲж–№дҫҝрҹ’…",
"ж•ҲжһңеҫҲж»Ўж„Ҹрҹ‘Қ"
]
};

function setType(t, btn){
type = t;

document.querySelectorAll(".typeBtn").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");
}

function generate(){
let arr = data[type];
textNow = arr[Math.floor(Math.random()*arr.length)];

document.getElementById("box").innerText =
textNow + "\n\n" + base;
}

function copy(){
if(!textNow){
alert("е…Ҳз”ҹжҲҗж–ҮжЎҲ");
return;
}

navigator.clipboard.writeText(textNow + "\n\n" + base);
alert("е·ІеӨҚеҲ¶");
}

function wa(){
window.open("https://wa.me/60176368216?text=HiпјҢжҲ‘жғійў„зәҰJY Salon", "_blank");
}
</script>

</body>
</html>
