<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JY Salon 文案工具</title>

<style>
body {
  font-family: Arial;
  background:#f7f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card {
  width:92%;
  max-width:450px;
  background:white;
  padding:20px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

button {
  margin:5px;
  padding:10px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.typeBtn {
  background:#eee;
}

.active {
  background:#ff6aa2;
  color:white;
}

#box {
  background:#f2f2f2;
  padding:12px;
  margin:15px 0;
  border-radius:10px;
  min-height:120px;
  text-align:left;
  white-space:pre-line;
}

.gen { background:#ff6aa2; color:white; }
.copy { background:#333; color:white; }
.wa { background:#25D366; color:white; }
</style>
</head>

<body>

<div class="card">

<h3>JY Salon 文案生成器</h3>

<div>
<button class="typeBtn active" onclick="setType('nail', this)">美甲</button>
<button class="typeBtn" onclick="setType('hair', this)">美发</button>
<button class="typeBtn" onclick="setType('both', this)">美甲+美发</button>
</div>

<div id="box">请选择服务</div>

<button class="gen" onclick="generate()">生成文案</button>
<button class="copy" onclick="copy()">复制</button>
<button class="wa" onclick="wa()">WhatsApp预约</button>

</div>

<script>
let type = "nail";
let textNow = "";

const base =
`📍JY Hair Design Nail Salon (Bukit Indah, Johor Bahru)

#bukitindah美发美甲店 #jbsalon #新山美甲 #新山剪发 #jyhairdesignnailsalon`;

const data = {
nail:[
"今天做美甲，整体很舒服🤍",
"美甲师很细心💅",
"成品很精致✨",
"简单款也很好看🌿"
],
hair:[
"今天剪头发很满意💇‍♀️",
"设计师很专业✨",
"剪完很自然👍",
"整体体验很好🤍"
],
both:[
"今天头发+美甲一起做🤍",
"整体变得很精致✨",
"一次搞定很方便💅",
"效果很满意👍"
]
};

function setType(t, btn){
type = t;
document.querySelectorAll(".typeBtn").forEach(b=>{
b.classList.remove("active");
});
btn.classList.add("active");
}

function generate(){
let arr = data[type];
textNow = arr[Math.floor(Math.random()*arr.length)];

document.getElementById("box").innerText =
textNow + "\n\n" + base;
}

function copy(){
if(!textNow){
alert("先生成文案");
return;
}

navigator.clipboard.writeText(textNow + "\n\n" + base)
.then(() => {
alert("已复制，正在打开小红书…");

// 延迟一点让用户看到提示
setTimeout(() => {

  // 小红书 App Scheme（优先）
  window.location.href = "xhsdiscover://";

  // 如果打不开 App（备用网页）
  setTimeout(() => {
    window.open("https://www.xiaohongshu.com", "_blank");
  }, 800);

}, 800);

});

}

function wa(){
window.open("https://wa.me/60176368216?text=Hi，我想预约JY Salon", "_blank");
}
</script>
</body>
</html>
